{% extends 'garage/base.html' %}

{% block content %}

<div class="hero-section mb-4">
    <h1>Prenota test drive</h1>
    <p>
        Scegli una data per provare il veicolo selezionato.
    </p>
</div>

<div class="card mb-4">
    <div class="card-body">
        <h5>{{ auto.marca }} {{ auto.modello }}</h5>
        <p>
            <strong>Anno:</strong> {{ auto.anno }} <br>
            <strong>Prezzo:</strong> € {{ auto.prezzo }} <br>
            <strong>Sede:</strong> {{ auto.sede.nome }}
        </p>
    </div>
</div>

<div class="card">
    <div class="card-body">

        <form method="post" class="test-drive-form">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success">
                Conferma prenotazione
            </button>

            <a href="{% url 'dettaglio_auto' auto.id %}" class="btn btn-secondary">
                Annulla
            </a>
        </form>

    </div>
</div>

{% endblock %}
