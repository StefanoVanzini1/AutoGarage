{% extends 'garage/base.html' %}

{% block content %}

<h2 class="mb-4">Login</h2>

{% if errore %}
<div class="alert alert-danger">
    {{ errore }}
</div>
{% endif %}

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit" class="btn btn-primary">
        Accedi
    </button>
</form>

<hr>

<p>
    Non hai un account?
    <a href="{% url 'registrazione' %}">
        Registrati
    </a>
</p>

{% endblock %}
